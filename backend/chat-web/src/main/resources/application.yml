server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: multi-agent-chat
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:multi_agent_chat}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:chat_user}
    password: ${MYSQL_PASSWORD:chat_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:3s}

llm:
  provider: ${LLM_PROVIDER:mock}
  base-url: ${LLM_BASE_URL:https://api.moonshot.cn/v1}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:moonshot-v1-8k}

intent:
  sql-keywords:
    - 多少
    - 查询
    - 统计
    - 销售额
    - 用户量
    - 订单数
  rag-keywords:
    - 流程
    - 制度
    - 怎么申请
    - 如何申请
    - 文档
    - 手册
    - 报销
